name: Job Scout Daily

on:
  schedule:
    # 9 AM UTC = 5 AM ET — runs before most people check LinkedIn in the morning
    - cron: '0 9 * * 1-5'
  workflow_dispatch:   # lets you trigger manually from GitHub Actions tab

jobs:
  scout:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit seen_jobs.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run job scout
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}   # optional but recommended
          SEND_EMPTY_DIGEST: "false"                       # set "true" to get daily all-clear
        run: python scout.py

      - name: Save updated seen_jobs list
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add data/seen_jobs.json
          # Only commit if there are changes (prevents empty commits)
          git diff --staged --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push
